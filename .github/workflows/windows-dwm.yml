name: Windows DWM

# Tani feedback dla najbardziej regresogennego kodu (ctypes/DWM). Pełny przebieg
# Windows z markerem `windows` URUCHAMIA SIĘ TYLKO, gdy PR dotyka ścieżek realnie
# wpływających na zachowanie DWM (łańcuch dwm.py → titlebar.py → theme.py).
#
# Filtr `paths` istnieje wyłącznie na poziomie workflow (GitHub Actions nie ma
# per-job `paths`), dlatego to OSOBNY plik, a nie job w ci.yml — dzięki temu przy
# PR-ach nietykających DWM runner Windows w ogóle nie startuje (zero minut).
# Pełny przebieg Windows przy tagu v* robi nadal job `windows-tag` w ci.yml.
on:
  pull_request:
    paths:
      - 'src/chodzkos_gui_kit/winutil/**'      # dwm.py: ctypes, flagi RDW_*, sygnatury HWND
      - 'src/chodzkos_gui_kit/**/titlebar.py'  # qt/tk: TitlebarSync, GetParent, set_titlebar
      - 'src/chodzkos_gui_kit/**/theme.py'      # attach_titlebar / _sync_titlebars (orkiestracja DWM)
      - '.github/workflows/windows-dwm.yml'     # zmiana samego workflow testuje workflow

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-dwm:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
      - run: uv sync --extra qt --extra tk --extra dev
      - run: uv run pytest -m "windows or not windows"
