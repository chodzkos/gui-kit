name: CI

on:
  push:
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    paths-ignore: ['**.md', 'docs/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
      - name: Sync (qt + tk + dev)
        run: uv sync --extra qt --extra tk --extra dev
      - name: Lint
        run: uv run ruff check .
      - name: Types
        run: uv run mypy src
      - name: Install Qt offscreen libs + Tk
        # python3-tk dostarcza _tkinter do systemowego Pythona (Ubuntu trzyma go
        # w osobnej paczce) — testy toru tk robią `import tkinter` (bez display).
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 python3-tk
      - name: Tests (bez markera windows)
        run: uv run pytest
      - name: Audit zależności (miękkie ostrzeżenie, nie blokuje CI)
        # pip-audit sprawdza zsynchronizowane środowisko (runtime + extras) pod
        # kątem znanych podatności (OSV/PyPI). continue-on-error = tylko ostrzeżenie.
        continue-on-error: true
        run: uv run --extra qt --extra tk --extra dev --with pip-audit pip-audit

  # Bramka pakowania: wheel MUSI wozić ikony SVG + LICENSE-icons + py.typed,
  # inaczej get_icon pada w zainstalowanej paczce (pyproject.toml to ostrzega).
  build:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
      - name: Build sdist + wheel
        run: uv build
      - name: Verify wheel bundles assets (icons SVG, LICENSE-icons, py.typed)
        run: |
          python3 - <<'PY'
          import glob, zipfile
          whl = glob.glob("dist/*.whl")
          assert whl, "brak wheela w dist/"
          names = zipfile.ZipFile(whl[0]).namelist()
          assert any(n.startswith("chodzkos_gui_kit/assets/icons/") and n.endswith(".svg") for n in names), "wheel bez ikon SVG (assets/icons/*.svg)"
          assert "chodzkos_gui_kit/assets/icons/LICENSE-icons" in names, "wheel bez LICENSE-icons"
          assert "chodzkos_gui_kit/py.typed" in names, "wheel bez py.typed"
          print("OK: wheel zawiera ikony SVG, LICENSE-icons i py.typed")
          PY
      - name: Install Qt offscreen libs
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1
      - name: Smoke-test built wheel in fresh venv (extra qt)
        # Instalacja zbudowanego wheela (nie edytowalnego repo) do czystego venv
        # + import toru Qt — łapie brak assetów/zależności w realnej paczce.
        run: |
          uv venv /tmp/smoke
          uv pip install --python /tmp/smoke "$(ls dist/*.whl)[qt]"
          /tmp/smoke/bin/python -c "import chodzkos_gui_kit; from chodzkos_gui_kit.qt import icons"

  # Testy DWM/Windows tylko przy tagu — oszczędzanie minut (GUI_STANDARD §9)
  windows-tag:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
      - run: uv sync --extra qt --extra tk --extra dev
      - run: uv run pytest -m "windows or not windows"
