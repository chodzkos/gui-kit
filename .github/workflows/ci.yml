name: CI

on:
  push:
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    paths-ignore: ['**.md', 'docs/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Sync (qt + tk + dev)
        run: uv sync --extra qt --extra tk --extra dev
      - name: Lint
        run: uv run ruff check .
      - name: Types
        run: uv run mypy src
      - name: Install Qt offscreen libs
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1
      - name: Tests (bez markera windows)
        run: uv run pytest

  # Testy DWM/Windows tylko przy tagu — oszczędzanie minut (GUI_STANDARD §9)
  windows-tag:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --extra qt --extra tk --extra dev
      - run: uv run pytest -m "windows or not windows"
