name: CodeQL

# Statyczna analiza bezpieczeństwa (CodeQL) dla kodu Pythona: na push/PR do main
# oraz cotygodniowo (łapie nowe reguły/CVE bez zmian w kodzie). Oficjalne akcje
# github/codeql-action przypięte do SHA (spójnie z resztą workflowów).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 3 * * 1' # w każdy poniedziałek ~03:27 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write # zapis alertów do zakładki Security
  actions: read

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@703b9949c65fcfced30e2f9f41569c4adfcb657f # v3.36.3
        with:
          languages: python
      # Python jest interpretowany — CodeQL nie potrzebuje kroku budowania.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@703b9949c65fcfced30e2f9f41569c4adfcb657f # v3.36.3
        with:
          category: '/language:python'
